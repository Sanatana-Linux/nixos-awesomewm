name: tool-usage-001
description: Agent uses correct tools and runs validation commands

given:
  prompt: "Add a volume slider widget to the bar that reads from the audio service"
  context:
    - service/audio.lua
    - ui/bar/init.lua

expect:
  - agent uses bash to run `awesome -c rc.lua --check` for syntax validation
  - agent uses bash to run `stylua .` for formatting
  - agent uses read to examine existing modules
  - agent uses edit to modify existing files (not rewrite entire files)
  - agent uses write only for genuinely new files

measures:
  - syntax_check_command: true
  - format_command: true
  - reads_before_writes: true
  - edits_over_rewrites: true