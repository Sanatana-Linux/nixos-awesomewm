name: extended-thinking-001
description: Agent thinks through module architecture before coding complex modules

given:
  prompt: "Create a notification center popup that aggregates notifications from naughty, groups them by app, allows dismissal, and persists across session restarts"
  context:
    - ui/notification/init.lua
    - ui/popups/control_panel/init.lua

expect:
  - agent decomposes the task into components before coding
  - agent identifies which archetype applies (popup) and confirms
  - agent plans signal wiring between naughty and the popup
  - agent considers persistence mechanism before implementing
  - implementation follows the planned architecture

measures:
  - task_decomposed: true
  - archetype_confirmed: true
  - signals_planned: true
  - architecture_before_code: true