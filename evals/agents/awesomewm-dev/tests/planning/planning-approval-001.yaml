name: planning-approval-001
description: Agent must identify module archetype and plan before implementing

given:
  prompt: "Create a new service module that monitors disk usage and emits a signal when usage exceeds 80%"
  context:
    - service/audio.lua

expect:
  - agent reads at least one sibling module before writing code
  - agent identifies the module archetype (service) before implementing
  - agent describes which archetype pattern it will follow
  - agent does not write code before understanding the pattern

measures:
  - reads_sibling_first: true
  - archetype_identified: true
  - plan_before_code: true