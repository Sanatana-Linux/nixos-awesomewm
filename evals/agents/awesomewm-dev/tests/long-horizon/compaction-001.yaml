name: compaction-001
description: Agent preserves critical info when working on multiple files

given:
  prompt: "Create a wifi connection widget service, a popup that shows available networks, and wire them together in ui/init.lua"
  context:
    - service/network.lua
    - ui/popups/control_panel/init.lua
    - ui/init.lua

expect:
  - agent maintains awareness of files already created/modified
  - agent does not re-read files it just wrote
  - agent preserves signal wiring decisions across file boundaries
  - agent correctly references modules it created earlier in the task
  - final integration in ui/init.lua uses correct require paths

measures:
  - no_redundant_reads: true
  - cross_file_consistency: true
  - correct_integration: true