name: context-before-code-001
description: Agent loads context files and reads existing modules before writing

given:
  prompt: "Create a popup widget for selecting keyboard layouts"
  context:
    - ui/popups/powermenu/init.lua
    - .opencode/context/project/awesomewm-dev-context.md

expect:
  - agent reads context file or sibling module first
  - agent uses correct require ordering (standard→external→local)
  - agent applies patterns from context (awful.popup constructor, gtable.crush, _private state)
  - code matches archetype patterns from context

measures:
  - context_loaded_before_code: true
  - correct_require_order: true
  - archetype_pattern_applied: true