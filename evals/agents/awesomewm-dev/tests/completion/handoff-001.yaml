name: handoff-001
description: Agent provides clear completion output with archetype, signals, and integration info

given:
  prompt: "Create a service module for monitoring CPU frequency"
  context:
    - service/audio.lua

expect:
  - agent reports which archetype was implemented
  - agent lists the file path created
  - agent lists all signals emitted by the module
  - agent provides the require path and get_default() call for integration
  - agent confirms syntax validation and formatting passed

measures:
  - archetype_reported: true
  - file_path_reported: true
  - signals_listed: true
  - integration_info: true
  - validation_confirmed: true